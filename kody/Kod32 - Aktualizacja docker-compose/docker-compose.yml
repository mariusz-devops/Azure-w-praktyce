services:
  # ... (frontend i backend pozostają bez zmian)
  
  db:
    image: mcr.microsoft.com/azure-sql-edge
    container_name: cloud-db
    restart: always
    environment:
      SA_PASSWORD: "StrongPassword123!"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    # KROK 1: Dodanie wolumenu do kontenera
    volumes:
      - sql-data:/var/opt/mssql
    networks:
      - cloud-network

# KROK 2: Globalna definicja wolumenu
volumes:
  sql-data:
